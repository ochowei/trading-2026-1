name: TQQQ Backtest

on:
  workflow_dispatch:
    inputs:
      experiment:
        description: "選擇要執行的實驗 (Select experiment)"
        required: true
        type: choice
        default: "TQQQ-001: tqqq_001_capitulation"
        options:
          - "TQQQ-001: tqqq_001_capitulation"
          - "TQQQ-002: tqqq_002_cap_relaxed_entry"
          - "TQQQ-003: tqqq_003_cap_wider_exit"
          - "TQQQ-004: tqqq_004_cap_vix_filter"
          - "TQQQ-005: tqqq_005_cap_vix_adaptive"
          - "TQQQ-006: tqqq_006_momentum_collapse"
          - "TQQQ-007: tqqq_007_cap_qqq_confirm"
          - "TQQQ-008: tqqq_008_cap_optimized_exit"
          - "TQQQ-009: tqqq_009_cap_gentle_entry"
          - "TQQQ-010: tqqq_010_cap_exec_optimized"
          - "TQQQ-011: tqqq_011_cap_exec_baseline"
          - "TQQQ-012: tqqq_012_cap_exec_qqq_confirm"
          - "TQQQ-013: tqqq_013_cap_exec_qqq_optimized"
          - "GLD-001: gld_001_mean_reversion"
          - "GLD-002: gld_002_optimized_exit"
          - "GLD-003: gld_003_trailing_stop"
          - "GLD-004: gld_004_bollinger_reversion"
          - "GLD-005: gld_005_keltner_reversion"
          - "GLD-006: gld_006_pullback_wr"
          - "GLD-007: gld_007_pullback_wr_reversal"
          - "SIVR-001: sivr_001_mean_reversion"
          - "SIVR-002: sivr_002_trailing_stop"
          - "FCX-001: fcx_001_extreme_oversold"

jobs:
  backtest:
    name: "Run ${{ inputs.experiment }}"
    runs-on: ubuntu-latest
    env:
      EXPERIMENT_NAME: ""
    steps:
      - name: Parse experiment name
        run: |
          # Extract the part after ": " (e.g. "TQQQ-001: tqqq_001_capitulation" -> "tqqq_001_capitulation")
          EXPERIMENT_NAME=$(echo "${{ inputs.experiment }}" | cut -d':' -f2 | xargs)
          echo "EXPERIMENT_NAME=$EXPERIMENT_NAME" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: "Run backtest: ${{ inputs.experiment }}"
        run: |
          echo "========================================="
          echo " Experiment: ${{ inputs.experiment }}"
          echo " Part A: 2019-01-01 ~ 2023-12-31 (In-Sample)"
          echo " Part B: 2024-01-01 ~ 2025-12-31 (Out-of-Sample)"
          echo " Part C: 2026-01-01 ~ today       (Live)"
          echo "========================================="
          uv run trading run "$EXPERIMENT_NAME"
