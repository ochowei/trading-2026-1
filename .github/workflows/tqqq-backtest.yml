name: TQQQ Capitulation Buy Backtest

on:
  workflow_dispatch:

jobs:
  backtest:
    name: Run TQQQ Capitulation Buy Strategy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run TQQQ backtest (Part A + Part B + Part C)
        run: |
          echo "========================================="
          echo " Strategy: TQQQ Capitulation Buy"
          echo " Part A: 2019-01-01 ~ 2023-12-31 (In-Sample)"
          echo " Part B: 2024-01-01 ~ 2025-12-31 (Out-of-Sample)"
          echo " Part C: 2026-01-01 ~ today     (Live)"
          echo "========================================="
          uv run trading-tw run tqqq_capitulation
