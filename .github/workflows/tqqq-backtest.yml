name: TQQQ Capitulation Buy Backtest

on:
  workflow_dispatch:
    inputs:
      period:
        description: '歷史資料期間 (Data period)'
        required: false
        default: '5y'
        type: choice
        options:
          - '5y'
          - '2y'
          - '1y'

jobs:
  backtest:
    name: Run TQQQ Capitulation Buy Strategy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run TQQQ backtest
        run: |
          echo "========================================="
          echo " Strategy: TQQQ Capitulation Buy"
          echo " Period:   ${{ inputs.period }}"
          echo "========================================="
          uv run trading-tw --strategy tqqq --period ${{ inputs.period }}
