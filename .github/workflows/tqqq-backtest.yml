name: TQQQ Backtest

on:
  workflow_dispatch:
    inputs:
      experiment:
        description: "選擇要執行的實驗 (Select experiment)"
        required: true
        type: choice
        default: tqqq_capitulation
        options:
          - tqqq_capitulation
          - tqqq_cap_relaxed_entry
          - tqqq_cap_wider_exit
          - tqqq_cap_vix_filter

jobs:
  backtest:
    name: "Run ${{ inputs.experiment }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: "Run backtest: ${{ inputs.experiment }}"
        run: |
          echo "========================================="
          echo " Experiment: ${{ inputs.experiment }}"
          echo " Part A: 2019-01-01 ~ 2023-12-31 (In-Sample)"
          echo " Part B: 2024-01-01 ~ 2025-12-31 (Out-of-Sample)"
          echo " Part C: 2026-01-01 ~ today       (Live)"
          echo "========================================="
          uv run trading run ${{ inputs.experiment }}
