name: TQQQ Backtest

on:
  workflow_dispatch:
    inputs:
      experiment:
        description: "選擇要執行的實驗 (Select experiment)"
        required: true
        type: choice
        default: "TQQQ-001: tqqq_capitulation"
        options:
          - "TQQQ-001: tqqq_capitulation"
          - "TQQQ-002: tqqq_cap_relaxed_entry"
          - "TQQQ-003: tqqq_cap_wider_exit"
          - "TQQQ-004: tqqq_cap_vix_filter"
          - "TQQQ-005: tqqq_cap_vix_adaptive"
          - "TQQQ-006: tqqq_momentum_collapse"
          - "TQQQ-007: tqqq_cap_qqq_confirm"

jobs:
  backtest:
    name: "Run ${{ inputs.experiment }}"
    runs-on: ubuntu-latest
    env:
      EXPERIMENT_NAME: ""
    steps:
      - name: Parse experiment name
        run: |
          # Extract the part after ": " (e.g. "TQQQ-001: tqqq_capitulation" -> "tqqq_capitulation")
          EXPERIMENT_NAME=$(echo "${{ inputs.experiment }}" | cut -d':' -f2 | xargs)
          echo "EXPERIMENT_NAME=$EXPERIMENT_NAME" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: "Run backtest: ${{ inputs.experiment }}"
        run: |
          echo "========================================="
          echo " Experiment: ${{ inputs.experiment }}"
          echo " Part A: 2019-01-01 ~ 2023-12-31 (In-Sample)"
          echo " Part B: 2024-01-01 ~ 2025-12-31 (Out-of-Sample)"
          echo " Part C: 2026-01-01 ~ today       (Live)"
          echo "========================================="
          uv run trading run "$EXPERIMENT_NAME"
