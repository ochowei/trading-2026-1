name: Stock Scanner - Mean Reversion

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: '標的清單 (Tickers, space-separated)'
        required: false
        default: 'SPY QQQ NVDA TSLA AAPL TQQQ AMZN META GOOGL MSFT AMD SOXX SOXL IWM DIA'
        type: string
      period:
        description: '歷史資料期間 (Data period)'
        required: false
        default: '5y'
        type: choice
        options:
          - '5y'
          - '2y'
          - '1y'
          - '6mo'

jobs:
  scan:
    name: Run Mean-Reversion Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run scanner
        run: |
          echo "========================================="
          echo " Tickers: ${{ inputs.tickers }}"
          echo " Period:  ${{ inputs.period }}"
          echo "========================================="
          uv run trading-tw --tickers ${{ inputs.tickers }} --period ${{ inputs.period }}
