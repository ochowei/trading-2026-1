name: Trading Followup Summary

on:
  workflow_dispatch:

jobs:
  followup:
    name: "Generate Trading Signals (Summary)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Generate followup report
        run: |
          {
            echo "### Trading Followup Report"
            echo "**Run time:** \`$(TZ='America/New_York' date '+%Y-%m-%d %H:%M ET')\`"
            echo "**Strategies:** COPX-001, DIA-003, FCX-001, GLD-006, IWM-001, NVDA-001, SIVR-006, SOXL-005, SPY-004, TQQQ-012, TSM-002, URA-001, USO-009, VOO-002, XBI-001, XLU-001"
            echo ""
            echo '```text'
            uv run trading followup
            echo '```'
          } | tee -a $GITHUB_STEP_SUMMARY
